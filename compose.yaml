services:
  opencac:
    build:
      context: .
    image: ghcr.io/lpoee/opencac:local
    command: ["serve", "--host", "0.0.0.0", "--port", "8000", "--workspace", "/data"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      A2A_ANTIGRAVITY_URL: ${A2A_ANTIGRAVITY_URL:-http://host.docker.internal:18101}
      A2A_CLAUDE_CODE_URL: ${A2A_CLAUDE_CODE_URL:-http://host.docker.internal:18102}
      A2A_CODEX_URL: ${A2A_CODEX_URL:-http://host.docker.internal:18103}
      A2A_ANTIGRAVITY_TOKEN: ${A2A_ANTIGRAVITY_TOKEN:-}
      A2A_CLAUDE_CODE_TOKEN: ${A2A_CLAUDE_CODE_TOKEN:-}
      A2A_CODEX_TOKEN: ${A2A_CODEX_TOKEN:-}
      A2A_CLOUD_FALLBACK_LOCAL: ${A2A_CLOUD_FALLBACK_LOCAL:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
